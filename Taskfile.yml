version: "3"

env:
  MISE_CONFIG_FILE: .config/mise.toml
  LEFTHOOK_CONFIG: .config/lefthook.yml

tasks:
  bootstrap:
    desc: "Install all tools and activate git hooks"
    cmds:
      - mise install
      - lefthook install
      - uv sync --dev

  dev:
    desc: "Run with hot reload"
    cmds:
      - uv run uvicorn --app-dir src simulation_engine.main:app --reload --port 8003

  lint:
    desc: "Run linters"
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  test:
    desc: "Run tests"
    cmds:
      - uv run pytest --cov

  typecheck:
    desc: "Run type checker"
    cmds:
      - uv run mypy src/

  spec:export:
    desc: "Export the generated OpenAPI spec to the docs repo (ADR-021)"
    cmds:
      - uv run python scripts/export_openapi.py --out
        ../bookie-breaker-docs/api-contracts/openapi/simulation-engine.yaml

  spec:check:
    desc: "Verify the committed OpenAPI artifact matches the served spec"
    cmds:
      - uv run python scripts/export_openapi.py | diff -
        ../bookie-breaker-docs/api-contracts/openapi/simulation-engine.yaml
