version: "3"

env:
  MISE_CONFIG_FILE: .config/mise.toml
  LEFTHOOK_CONFIG: .config/lefthook.yml

tasks:
  bootstrap:
    desc: "Install all tools and activate git hooks"
    cmds:
      - mise install
      - lefthook install
      - uv sync --dev

  dev:
    desc: "Run with hot reload"
    cmds:
      - uv run uvicorn src.simulation_engine.main:app --reload --port 8003

  lint:
    desc: "Run linters"
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  test:
    desc: "Run tests"
    cmds:
      - uv run pytest --cov

  typecheck:
    desc: "Run type checker"
    cmds:
      - uv run mypy src/
