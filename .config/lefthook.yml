rc: .config/lefthook.rc

pre-commit:
  jobs:
    # === Job 1: Format ===
    # Auto-fix formatting issues before linting sees the code
    - name: format
      group:
        parallel: true
        jobs:
          # --- Standard Formatters ---
          - name: dockfmt
            glob: "Dockerfile*"
            run: dockfmt fmt {staged_files}
            stage_fixed: true

          - name: prettier
            glob: "*.{json,yaml,yml,md}"
            run: prettier --config .config/prettierrc.json --write {staged_files}
            stage_fixed: true

          - name: shfmt
            glob: "*.{sh,bash,zsh}"
            run: shfmt -w -i 2 -ci -bn {staged_files}
            stage_fixed: true

          - name: taplo-format
            glob: "*.toml"
            run: taplo format --config .config/taplo.toml {staged_files}
            stage_fixed: true

          # --- Language-Specific Formatters ---
          - name: ruff-format
            glob: "*.py"
            run: uv run ruff format {staged_files}
            stage_fixed: true

    # === Job 2: Lint ===
    # Check formatted code for issues
    - name: lint
      exclude:
        - .claude/**
        - CLAUDE.md
      group:
        parallel: true
        jobs:
          # --- Standard Linters ---
          - name: actionlint
            glob: ".github/workflows/*.{yml,yaml}"
            run: actionlint {staged_files}

          - name: hadolint
            glob: "Dockerfile*"
            run: hadolint {staged_files}

          - name: jsoncheck
            glob: "*.json"
            run: 'python3 -c "import json,sys; [json.load(open(f)) for f in sys.argv[1:]]" {staged_files}'

          - name: markdownlint-cli2
            glob: "*.md"
            run: markdownlint-cli2 --config .config/.markdownlint-cli2.jsonc {staged_files}

          - name: shellcheck
            glob: "*.sh"
            run: shellcheck {staged_files}

          - name: taplo-check
            glob: "*.toml"
            run: taplo check --config .config/taplo.toml {staged_files}

          - name: yamllint
            glob: "*.{yml,yaml}"
            run: yamllint -c .config/yamllint.yml {staged_files}

          # --- Language-Specific Linters ---
          - name: mypy
            glob: "*.py"
            run: uv run mypy src/

          - name: ruff-check
            glob: "*.py"
            run: uv run ruff check --fix {staged_files}
            stage_fixed: true

    # === Job 3: Security ===
    # Scan for secrets and credentials
    - name: security
      group:
        parallel: true
        jobs:
          - name: gitleaks
            run: gitleaks protect --staged --no-banner

commit-msg:
  commands:
    gitfluff:
      run: gitfluff lint {1}

pre-push:
  parallel: true
  commands:
    pytest:
      run: uv run pytest tests/unit/ tests/integration/
    mypy:
      run: uv run mypy src/
    pip-audit:
      run: uv run pip-audit
